<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VR Network Lab - Auto Port Logic</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0b1220; font-family: sans-serif; }
    #hud { position: fixed; top: 12px; left: 12px; z-index: 20; color: white; background: rgba(0,0,0,.8); border-radius: 12px; padding: 15px; width: 320px; border: 1px solid rgba(255,255,255,0.1); }
    #status-box { margin-top: 10px; padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05); }
    .ok { color: #4ade80; font-weight: bold; }
    .bad { color: #f87171; font-weight: bold; }
    .sel { color: #fbbf24; }
    button { margin-top: 10px; width: 100%; padding: 10px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 5px; font-weight: bold; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <div id="hud">
    <b>Network Cable Lab</b><br>
    <small>?????????: ??????????????? <b>Crossover</b> ???????? ??????? ??.</small>
    
    <div id="status-box">
      ??????: <span id="selectedCable" class="sel">???????</span><br>
      ???? 1: <span id="selectedPort">???????</span><br>
      ?????: <span id="status">?????? ?????...</span>
    </div>
    
    <button id="resetBtn">????? ?????</button>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    // --- ???? ???????? ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1220);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
    scene.add(light);

    // --- ??????? ????? ????? ---
    let selectedCableType = null;
    let firstPort = null;
    const interactables = [];
    const packetFlows = [];
    let blinkingInvalid = null;

    const cableEl = document.getElementById("selectedCable");
    const portEl = document.getElementById("selectedPort");
    const statusEl = document.getElementById("status");

    // --- ???? ?????? ????? ---
    function createPort(name, deviceName, pos) {
      const geo = new THREE.SphereGeometry(0.08, 16, 16);
      const mat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x330000 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.userData = { kind: "port", deviceName, connected: false };
      scene.add(mesh);
      interactables.push(mesh);
      return mesh;
    }

    // --- ?????? ??????? ---
    function createCableUI(name, type, color, x) {
      const geo = new THREE.TorusGeometry(0.15, 0.04, 16, 32);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, 0.5, 4); 
      mesh.rotation.x = Math.PI / 2;
      mesh.userData = { kind: "cableSelector", type, name };
      scene.add(mesh);
      interactables.push(mesh);
    }
    createCableUI("Straight", "straight", 0x4ade80, -0.8);
    createCableUI("Crossover", "crossover", 0xf97316, 0.8);

    // --- ????????? ????? ---
    function handleSelection(obj) {
      if (obj.userData.kind === "cableSelector") {
        selectedCableType = obj.userData.type;
        cableEl.textContent = obj.userData.name;
        statusEl.innerHTML = "???? ??????? ??";
      } else if (obj.userData.kind === "port") {
        if (!selectedCableType) {
          statusEl.innerHTML = "<span class='bad'>?????? ?????? ?????!</span>";
          return;
        }
        if (obj.userData.connected) return;

        if (!firstPort) {
          firstPort = obj;
          obj.material.color.set(0xffff00); 
          portEl.textContent = obj.userData.deviceName;
        } else {
          if (firstPort === obj) return;
          checkConnection(firstPort, obj);
          firstPort = null;
          portEl.textContent = "???????";
        }
      }
    }

    // --- ??????? ?????? ---
    function checkConnection(p1, p2) {
      const isValid = (selectedCableType === "crossover");

      const start = p1.position.clone();
      const end = p2.position.clone();
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mid.y += 0.8; 

      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      const points = curve.getPoints(50);
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ 
        color: isValid ? 0x22c55e : 0xff0000, 
        linewidth: 4 
      });
      const line = new THREE.Line(geo, mat);
      scene.add(line);

      if (isValid) {
        p1.userData.connected = true;
        p2.userData.connected = true;
        p1.material.color.set(0x00ff00);
        p2.material.color.set(0x00ff00);
        statusEl.innerHTML = "<span class='ok'>???! (Crossover)</span>";
        
        const pGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const pMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const pMesh = new THREE.Mesh(pGeo, pMat);
        scene.add(pMesh);
        packetFlows.push({ mesh: pMesh, curve, t: 0 });
      } else {
        statusEl.innerHTML = "<span class='bad'>????? ??????!</span>";
        blinkingInvalid = { line, start: Date.now() };
        setTimeout(() => {
          scene.remove(line);
          p1.material.color.set(0xff0000);
          p2.material.color.set(0xff0000);
        }, 1500);
      }
    }

    // --- ?????? ????? ????? ??????? ???? ---
    const loader = new GLTFLoader();
    loader.load('./abc.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);
      statusEl.textContent = "?????";

      // ?????? ?????? ??????????? ?????? ?? ???? ????
      model.traverse((child) => {
        if (child.isMesh) {
          const name = child.name.toLowerCase();
          // ????? ???????? ?????? ?????????, ????, ?????? ????? ?? ??????
          if (name.includes("pc") || name.includes("switch") || name.includes("router") || name.includes("server")) {
            
            // ???????? ??????? ??????????? ????
            const worldPos = new THREE.Vector3();
            child.getWorldPosition(worldPos);

            // ?????? ???????? ?????? ?????????? (????????? ????? ?????????? ?????????)
            const portPos = new THREE.Vector3(worldPos.x, worldPos.y + 0.3, worldPos.z + 0.5);
            createPort(child.name, child.name.toUpperCase(), portPos);
          }
        }
      });
    });

    // --- ??????? ?????? ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener("pointerdown", (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(interactables);
      if (hits.length > 0) handleSelection(hits[0].object);
    });

    // --- ???????? ---
    function animate() {
      requestAnimationFrame(animate);
      packetFlows.forEach(f => {
        f.t += 0.008;
        if (f.t > 1) f.t = 0;
        f.mesh.position.copy(f.curve.getPoint(f.t));
      });
      if (blinkingInvalid) {
        const elapsed = Date.now() - blinkingInvalid.start;
        blinkingInvalid.line.visible = Math.floor(elapsed / 200) % 2 === 0;
        if (elapsed > 1500) blinkingInvalid = null;
      }
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById("resetBtn").onclick = () => location.reload();
  </script>
</body>
</html>
